<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PlateWise AR — quick check and pledge" />
  <meta name="theme-color" content="#1f6e47" />
  <title>PlateWise AR — Quick check</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>

  <main class="page stack">
    <header>
      <span class="eyebrow">Reflection</span>
      <h1 class="mt-2">Quick check</h1>
      <p class="lede">Five short questions.</p>
    </header>

    <!-- Recall of the last AR / Demo action (shown via JS if one is saved) -->
    <div class="last-action-note" id="last-action-note" hidden></div>

    <!-- Questions (injected by quiz.js) -->
    <section aria-label="Quiz questions">
      <div id="quiz-container" class="stack"></div>

      <!-- Result (shown after all questions answered) -->
      <div id="quiz-result" class="card center" style="display:none;">
        <div class="score-display" id="score-display"></div>
        <p id="score-message" class="muted"></p>
        <button type="button" class="btn btn--secondary btn--small mt-3" id="btn-retry">Retry</button>
      </div>
    </section>

    <!-- Pledge -->
    <section class="card" aria-label="Action pledge">
      <h2>Make a pledge</h2>
      <p class="muted text-sm mb-3">Pick one change you'll try.</p>

      <div id="pledge-options"></div>

      <button type="button" class="btn mt-3" id="btn-save-pledge">Save pledge</button>
      <p id="pledge-confirmation" class="center mt-3" style="display:none; font-weight:600;"></p>
    </section>

    <!-- Saved results -->
    <details class="acc">
      <summary>Your saved results</summary>
      <div class="acc__body">
        <p id="saved-score">No quiz score saved yet.</p>
        <p id="saved-pledge">No pledge saved yet.</p>
      </div>
    </details>
  </main>

  <script type="module" src="./src/app.js"></script>
  <script type="module" src="./src/quiz.js"></script>
</body>
</html>
